<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marie's Fleißheft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Karla:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14211D;
    --bg-deep: #0F1A20;
    --paper-deep: #1B2C25;
    --line: #33473C;
    --ink: #EAF3EC;
    --ink-soft: #A9C0B4;
    --berry: #4FC3D9;
    --berry-deep: #2E93A8;
    --gold: #9CE6B8;
    --gold-light: #C9F5DA;
    --star-gold: #F2C14E;
    --sage: #6FE0A8;
    --moss: #3D5A47;
    --card-shadow: 0 0 0 1px rgba(111,224,168,0.08), 0 8px 30px rgba(0,0,0,0.45);
    --cream: #F3ECDD;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: #16241F;
    color: var(--ink);
    font-family: 'Karla', sans-serif;
    min-height: 100vh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(circle at 20% 0%, rgba(79,195,217,0.16), transparent 45%),
      radial-gradient(circle at 85% 10%, rgba(111,224,168,0.18), transparent 40%),
      linear-gradient(180deg, #131F1B 0%, #16241F 20%, #2C382E 44%, #6E6046 68%, #B7A47F 86%, #F3ECDD 100%);
  }

  #bg-deco {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }
  #bg-deco svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .deco-collar { right: -10px; bottom: -10px; width: 380px; height: 380px; inset: auto; filter: blur(1.5px); }

  /* Aufgaben: Seil/Fesselband, kräftiger */
  #bg-deco.tab-auftraege .deco-rope { opacity: 1; }
  /* Rituale: Kettenmuster, deutlich sichtbar */
  #bg-deco.tab-ketten .deco-pattern { opacity: 1; }
  /* Sternchen: Kerzenschein + Halsband */
  #bg-deco.tab-sternenregen .deco-bokeh { opacity: 1; }
  #bg-deco.tab-sternenregen .deco-collar { opacity: 0.42; }

  /* per-tab Grundton */
  .tab-panel[data-tab="auftraege"] {
    background: radial-gradient(ellipse at 15% 0%, rgba(111,224,168,0.16), transparent 65%);
    border-radius: 22px;
    padding: 6px 6px 2px;
  }
  .tab-panel[data-tab="ketten"] {
    background: radial-gradient(ellipse at 85% 0%, rgba(79,195,217,0.18), transparent 65%);
    border-radius: 22px;
    padding: 6px 6px 2px;
  }
  .tab-panel[data-tab="sternenregen"] {
    background: radial-gradient(ellipse at 50% 100%, rgba(242,193,78,0.16), transparent 65%);
    border-radius: 22px;
    padding: 6px 6px 2px;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 28px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* neon rave badge */
  .tape {
    position: relative;
    display: inline-block;
    background: rgba(111,224,168,0.08);
    color: var(--gold);
    padding: 6px 20px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid rgba(111,224,168,0.4);
    border-radius: 30px;
    margin-bottom: 10px;
    box-shadow: 0 0 18px rgba(111,224,168,0.35), inset 0 0 8px rgba(111,224,168,0.15);
  }

  header {
    text-align: center;
    margin-bottom: 22px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 2.1rem;
    font-weight: 800;
    margin: 10px 0 4px;
    color: var(--cream);
    letter-spacing: -0.01em;
    text-shadow: 0 0 24px rgba(79,195,217,0.55), 0 0 46px rgba(111,224,168,0.25);
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
  }

  .role-switch {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 14px;
  }
  .role-btn {
    font-family: 'Karla', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--line);
    background: rgba(15,26,21,0.55);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .role-btn.active {
    background: var(--sage);
    color: #06110C;
    border-color: var(--sage);
    box-shadow: 0 0 14px rgba(111,224,168,0.5);
  }

  /* score card */
  .score-card {
    background: linear-gradient(160deg, rgba(111,224,168,0.06), rgba(79,195,217,0.05) 60%), var(--paper-deep);
    border-radius: 20px;
    box-shadow: var(--card-shadow);
    padding: 26px 22px;
    text-align: center;
    margin-bottom: 26px;
    position: relative;
    border: 1px solid rgba(111,224,168,0.18);
    overflow: hidden;
  }
  .score-card::before {
    content: '';
    position: absolute;
    top: -60%; left: -20%;
    width: 60%; height: 220%;
    background: linear-gradient(115deg, rgba(255,255,255,0.10), transparent 55%);
    transform: rotate(8deg);
    pointer-events: none;
  }
  .score-count {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 3rem;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 22px rgba(111,224,168,0.6);
  }
  .score-label {
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .reward-block {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
  }
  .reward-dots {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 3px;
    font-size: 1.3rem;
    line-height: 1;
    margin-bottom: 8px;
  }
  .reward-text {
    font-size: 0.8rem;
    color: var(--ink-soft);
  }
  .reward-text strong { color: var(--berry); font-weight: 600; }
  .reward-rounds {
    font-size: 0.68rem;
    color: var(--ink-soft);
    opacity: 0.7;
    margin-top: 2px;
  }
  .reward-edit-toggle {
    background: none;
    border: none;
    color: var(--ink-soft);
    text-decoration: underline;
    font-size: 0.72rem;
    cursor: pointer;
    margin-top: 8px;
    padding: 2px 4px;
  }
  .reward-edit-toggle:hover { color: var(--berry); }
  .reward-edit-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .reward-edit-row input[type="text"] { flex: 1; }

  section {
    margin-bottom: 26px;
  }

  .tab-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 0;
  }
  .tab-btn {
    flex: 1;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 6px 12px;
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    position: relative;
    transition: color 0.2s ease;
  }
  .tab-btn::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: transparent;
    border-radius: 2px;
  }
  .tab-btn.active {
    color: var(--sage);
  }
  .tab-btn.active::after {
    background: var(--sage);
    box-shadow: 0 0 10px rgba(111,224,168,0.8);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--line), transparent);
  }

  .card {
    position: relative;
    background: rgba(15,26,21,0.62);
    backdrop-filter: blur(6px);
    border-radius: 16px;
    padding: 14px 16px;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(111,224,168,0.14);
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -50%; left: -10%;
    width: 45%; height: 200%;
    background: linear-gradient(115deg, rgba(255,255,255,0.06), transparent 60%);
    transform: rotate(10deg);
    pointer-events: none;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
    position: relative;
  }
  .task-item:last-child { border-bottom: none; }

  .task-check {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid var(--sage);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--sage);
    font-size: 0.9rem;
    transition: all 0.2s ease;
  }
  .task-check::after { content: ''; }
  .task-check:hover::after { content: '✓'; }
  .task-check:hover { background: var(--sage); color: #06110C; box-shadow: 0 0 12px rgba(111,224,168,0.7); }

  .task-title {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
  }
  .task-desc {
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 2px;
  }
  .task-main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .task-points {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--berry);
    font-weight: 600;
    white-space: nowrap;
  }
  .task-remove {
    background: none;
    border: none;
    color: var(--ink-soft);
    opacity: 0.4;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 4px;
  }
  .task-remove:hover { opacity: 1; color: var(--berry); }

  /* series */
  .series-card {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--line);
  }
  .series-card:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .series-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .series-name {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--ink);
  }
  .series-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--gold);
    white-space: nowrap;
  }
  .series-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin: 8px 0;
    font-size: 1.15rem;
    line-height: 1;
  }
  .series-dot {
    color: var(--ink-soft);
    opacity: 0.35;
  }
  .series-dot.filled {
    color: var(--star-gold);
    opacity: 1;
    text-shadow: 0 0 10px rgba(242,193,78,0.75);
  }
  .series-reward {
    font-size: 0.78rem;
    color: var(--ink-soft);
  }
  .series-reward strong { color: var(--berry); font-weight: 600; }
  .series-rounds {
    font-size: 0.68rem;
    color: var(--ink-soft);
    opacity: 0.7;
    margin-top: 2px;
  }
  .series-controls {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .series-controls input[type="text"] { flex: 1; }
  .series-remove {
    background: none;
    border: none;
    color: var(--ink-soft);
    opacity: 0.4;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .series-remove:hover { opacity: 1; color: var(--berry); }
  .add-series-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  .add-series-form .row { display: flex; gap: 8px; }
  .add-series-form .row input[type="text"]:first-child { flex: 2; }
  .add-series-form .target-input { width: 64px; text-align: center; }

  .empty-note {
    font-size: 0.85rem;
    color: var(--ink-soft);
    font-style: italic;
    padding: 8px 0;
  }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  input[type="text"], textarea {
    font-family: 'Karla', sans-serif;
    font-size: 0.9rem;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: rgba(15,26,21,0.55);
    color: var(--ink);
    outline: none;
  }
  input[type="text"]::placeholder, textarea::placeholder { color: var(--ink-soft); opacity: 0.6; }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--sage);
    box-shadow: 0 0 10px rgba(111,224,168,0.35);
  }
  .add-row input[type="text"]:first-child { flex: 1; }
  .points-input {
    width: 64px;
    text-align: center;
  }
  button.primary {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--sage), var(--berry));
    color: #06110C;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    white-space: nowrap;
    box-shadow: 0 0 16px rgba(111,224,168,0.4);
  }
  button.primary:hover { box-shadow: 0 0 24px rgba(111,224,168,0.65); }
  button.primary:active { transform: scale(0.96); }

  .star-form textarea {
    width: 100%;
    min-height: 60px;
    resize: vertical;
    margin-bottom: 10px;
  }
  .star-form-footer {
    display: flex;
    justify-content: flex-end;
  }

  /* history */
  .log-entry {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--line);
  }
  .log-entry:last-child { border-bottom: none; }

  .stamp {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--sage);
    color: var(--sage);
    background: rgba(111,224,168,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transform: rotate(-8deg);
    box-shadow: 0 0 14px rgba(111,224,168,0.5);
  }
  .log-body { flex: 1; }
  .log-text { font-size: 0.9rem; color: var(--ink); }
  .log-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--berry);
    margin-top: 2px;
  }

  /* WhatsApp-style simulated notification */
  #wa-toast {
    position: fixed;
    top: -140px;
    left: 50%;
    transform: translateX(-50%);
    width: min(360px, 90vw);
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    z-index: 999;
    transition: top 0.5s cubic-bezier(.2,.9,.3,1.2);
  }
  #wa-toast.show { top: 16px; }
  .wa-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: #25D366;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.3rem;
  }
  .wa-content { flex: 1; font-family: 'Karla', sans-serif; }
  .wa-title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .wa-title { font-weight: 700; font-size: 0.85rem; color: #111; }
  .wa-time { font-size: 0.7rem; color: #999; }
  .wa-msg { font-size: 0.82rem; color: #333; margin-top: 2px; line-height: 1.3; }
  .wa-disclaimer {
    font-size: 0.62rem;
    color: #bbb;
    margin-top: 2px;
  }

  .footer-note {
    text-align: center;
    font-size: 0.72rem;
    color: var(--ink-soft);
    opacity: 0.6;
    margin-top: 30px;
  }

  @media (prefers-reduced-motion: reduce) {
    #wa-toast { transition: none; }
  }

  /* PIN gate */
  #pin-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  #pin-overlay.show { display: flex; }
  #pin-box {
    background: var(--paper-deep);
    border: 1px solid rgba(111,224,168,0.25);
    border-radius: 16px;
    padding: 22px;
    width: min(280px, 100%);
    box-shadow: var(--card-shadow);
    text-align: center;
  }
  .pin-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }
  #pin-input {
    width: 100%;
    text-align: center;
    letter-spacing: 0.3em;
    font-size: 1.1rem;
  }
  .pin-error {
    font-size: 0.75rem;
    color: var(--berry);
    min-height: 1.1em;
    margin-top: 8px;
  }
  .pin-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .pin-actions button { flex: 1; }
  .pin-cancel {
    font-family: 'Karla', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .pin-cancel:hover { border-color: var(--ink-soft); }
</style>
</head>
<body>

<div id="bg-deco" aria-hidden="true">
  <!-- Rituale: Kettenglieder, deutlich als Kette erkennbar (verschränkte Ringe) -->
  <svg class="deco-pattern" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice">
    <defs>
      <pattern id="chainPattern" width="64" height="64" patternUnits="userSpaceOnUse" patternTransform="rotate(22)">
        <ellipse cx="16" cy="32" rx="15" ry="9" fill="none" stroke="#CBD9D2" stroke-width="4"/>
        <ellipse cx="40" cy="32" rx="9" ry="15" fill="none" stroke="#CBD9D2" stroke-width="4"/>
      </pattern>
    </defs>
    <rect width="200" height="200" fill="url(#chainPattern)" opacity="0.42"/>
  </svg>

  <!-- Aufgaben: Seil / Fesselband, kräftiger Schwung mit Twist-Textur -->
  <svg class="deco-rope" viewBox="0 0 400 800" preserveAspectRatio="none">
    <defs>
      <filter id="ropeBlur" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4"/>
      </filter>
    </defs>
    <path id="ropePath" d="M -40 90 C 120 40, 180 220, 340 160 S 460 340, 300 420 S 120 560, 320 640 S 460 760, 280 800"
          stroke="#3D5A47" stroke-width="30" fill="none" opacity="0.28"
          stroke-linecap="round" filter="url(#ropeBlur)"/>
    <path d="M -40 90 C 120 40, 180 220, 340 160 S 460 340, 300 420 S 120 560, 320 640 S 460 760, 280 800"
          stroke="#6FE0A8" stroke-width="30" fill="none" opacity="0.22"
          stroke-linecap="round" stroke-dasharray="4 10" filter="url(#ropeBlur)"/>
    <path d="M -40 90 C 120 40, 180 220, 340 160 S 460 340, 300 420 S 120 560, 320 640 S 460 760, 280 800"
          stroke="#0F1A16" stroke-width="30" fill="none" opacity="0.18"
          stroke-linecap="round" stroke-dasharray="4 10" stroke-dashoffset="7" filter="url(#ropeBlur)"/>
  </svg>

  <!-- Sternchen: Kerzenschein-Bokeh, warm im unteren Bereich -->
  <svg class="deco-bokeh" viewBox="0 0 400 800" preserveAspectRatio="none">
    <defs>
      <filter id="bokehBlur" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="14"/>
      </filter>
    </defs>
    <circle cx="60" cy="560" r="34" fill="#F2C14E" opacity="0.32" filter="url(#bokehBlur)"/>
    <circle cx="150" cy="660" r="22" fill="#F2C14E" opacity="0.26" filter="url(#bokehBlur)"/>
    <circle cx="330" cy="600" r="28" fill="#F2C14E" opacity="0.28" filter="url(#bokehBlur)"/>
    <circle cx="260" cy="720" r="18" fill="#F2C14E" opacity="0.24" filter="url(#bokehBlur)"/>
    <circle cx="40" cy="740" r="16" fill="#F2C14E" opacity="0.22" filter="url(#bokehBlur)"/>
  </svg>

  <!-- Sternchen: Halsband mit O-Ring, Schnalle und Nieten, klar erkennbar -->
  <svg class="deco-collar" viewBox="0 0 220 220">
    <ellipse cx="110" cy="76" rx="80" ry="46" fill="none" stroke="#6FE0A8" stroke-width="12"/>
    <circle cx="45" cy="66" r="4" fill="#6FE0A8"/>
    <circle cx="80" cy="34" r="4" fill="#6FE0A8"/>
    <circle cx="140" cy="34" r="4" fill="#6FE0A8"/>
    <circle cx="175" cy="66" r="4" fill="#6FE0A8"/>
    <rect x="92" y="56" width="36" height="20" rx="4" fill="none" stroke="#6FE0A8" stroke-width="7"/>
    <circle cx="110" cy="130" r="16" fill="none" stroke="#6FE0A8" stroke-width="8"/>
    <line x1="110" y1="120" x2="110" y2="140" stroke="#6FE0A8" stroke-width="4"/>
  </svg>
</div>

<div id="wa-toast">
  <div class="wa-icon">💬</div>
  <div class="wa-content">
    <div class="wa-title-row">
      <span class="wa-title" id="wa-sender">Dein Schatz</span>
      <span class="wa-time" id="wa-time">jetzt</span>
    </div>
    <div class="wa-msg" id="wa-message"></div>
    <div class="wa-disclaimer">simuliert – kein echtes WhatsApp</div>
  </div>
</div>

<div id="pin-overlay">
  <div id="pin-box">
    <div class="pin-title">PIN eingeben</div>
    <input type="password" id="pin-input" inputmode="numeric" maxlength="6" autocomplete="off" onkeydown="if(event.key==='Enter') checkPin();">
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-actions">
      <button class="pin-cancel" onclick="closePinModal()">Abbrechen</button>
      <button class="primary" onclick="checkPin()">Bestätigen</button>
    </div>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="tape">Fleißheft</div>
    <h1>Marie's Sternchen</h1>
    <div class="subtitle">jeden Tag ein bisschen mehr Glanz</div>
    <div class="role-switch">
      <button class="role-btn" id="role-marie" onclick="setRole('marie')">Ich bin Marie</button>
      <button class="role-btn" id="role-partner" onclick="openPinModal()">Ich vergebe Sterne</button>
    </div>
  </header>

  <div class="score-card">
    <div class="score-count" id="total-points">0</div>
    <div class="score-label">Sterne gesammelt</div>

    <div class="reward-block">
      <div class="reward-dots" id="reward-dots"></div>
      <div class="reward-text" id="reward-text"></div>
      <div class="reward-rounds" id="reward-rounds"></div>
      <button class="reward-edit-toggle" id="reward-edit-toggle" onclick="toggleRewardEdit()">Belohnung festlegen</button>
      <div class="reward-edit-row" id="reward-edit-row" style="display:none;">
        <input type="text" id="reward-edit-input" placeholder="z.B. eine Massage, ein Date-Abend...">
        <button class="primary" onclick="saveMainReward()">Speichern</button>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn" id="tab-btn-auftraege" onclick="switchTab('auftraege')">Aufgaben</button>
    <button class="tab-btn" id="tab-btn-ketten" onclick="switchTab('ketten')">Rituale</button>
    <button class="tab-btn" id="tab-btn-sternenregen" onclick="switchTab('sternenregen')">Sternchen</button>
  </div>

  <div class="tab-panel" data-tab="auftraege">
    <section>
      <div class="section-title">Aufgaben</div>
      <div class="card">
        <div id="task-list"></div>
        <div class="add-row" id="add-task-row">
          <input type="text" id="new-task-title" placeholder="Neue Aufgabe...">
          <input type="text" id="new-task-points" class="points-input" placeholder="Pkt." value="2" inputmode="numeric">
          <button class="primary" onclick="addTask()">+</button>
        </div>
        <div class="add-row" id="add-task-desc-row" style="margin-top:6px;">
          <input type="text" id="new-task-desc" placeholder="Notiz (optional)...">
        </div>
      </div>
    </section>
  </div>

  <div class="tab-panel" data-tab="ketten">
    <section>
      <div class="section-title">Rituale</div>
      <div class="card" id="series-list"></div>
      <div class="card" id="add-series-card" style="margin-top:12px;">
        <div class="add-series-form">
          <div class="row">
            <input type="text" id="new-series-name" placeholder="Name der Serie (z.B. Gute Nachrichten)">
            <input type="text" id="new-series-target" class="target-input" placeholder="Ziel" value="10" inputmode="numeric">
          </div>
          <input type="text" id="new-series-reward" placeholder="Belohnung bei Erreichen...">
          <button class="primary" onclick="addSeries()" style="align-self:flex-end;">+ Serie anlegen</button>
        </div>
      </div>
    </section>
  </div>

  <div class="tab-panel" data-tab="sternenregen">
    <section id="star-section">
      <div class="section-title">Spontanes Sternchen</div>
      <div class="card star-form">
        <textarea id="star-message" placeholder="Schreib ihr, wofür sie den Stern verdient hat..."></textarea>
        <div class="star-form-footer">
          <button class="primary" onclick="giveStar()">⭐ Stern geben</button>
        </div>
      </div>
    </section>

    <section id="star-empty-note">
      <div class="card">
        <div class="empty-note" style="padding:2px 0;">Hier gibt's nichts zu tun – lehn dich zurück, die Überraschung kommt von ganz allein.</div>
      </div>
    </section>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCeNpm-jpQlQrrhb93jvT5aY0MKa6Cp2V4",
  authDomain: "marie-faa8f.firebaseapp.com",
  databaseURL: "https://marie-faa8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "marie-faa8f",
  storageBucket: "marie-faa8f.firebasestorage.app",
  messagingSenderId: "769922824685",
  appId: "1:769922824685:web:dbc3e43178a4a6d6b64fe4"
};
firebase.initializeApp(firebaseConfig);
const dataRef = firebase.database().ref('fleissheftData');

const DEFAULT_STATE = { tasks: {}, log: {}, series: {}, mainReward: { target: 10, reward: '', count: 0, completedRounds: 0 } };
let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
let role = 'marie';

let currentTab = 'auftraege';

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.id === 'tab-btn-' + name);
  });
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.classList.toggle('active', panel.dataset.tab === name);
  });
  const deco = document.getElementById('bg-deco');
  deco.classList.remove('tab-auftraege', 'tab-ketten', 'tab-sternenregen');
  deco.classList.add('tab-' + name);
}

function load() {
  role = localStorage.getItem('fleissheft-role') || 'marie';
  updateRoleUI();
  switchTab(currentTab);

  // Live-Synchronisation: läuft bei jeder Änderung automatisch neu, auf beiden Geräten
  dataRef.on('value', (snapshot) => {
    const val = snapshot.val();
    state = val ? val : JSON.parse(JSON.stringify(DEFAULT_STATE));
    if (!state.series) state.series = {};
    if (!state.tasks) state.tasks = {};
    if (!state.log) state.log = {};
    if (!state.mainReward) state.mainReward = { target: 10, reward: '', count: 0, completedRounds: 0 };
    if (state.mainReward.target !== 10) {
      state.mainReward.target = 10;
      dataRef.child('mainReward/target').set(10).catch(() => {});
    }
    render();
  }, (error) => {
    console.error('Firebase-Verbindung fehlgeschlagen', error);
  });
}

const PARTNER_PIN = '2003';

function openPinModal() {
  document.getElementById('pin-overlay').classList.add('show');
  document.getElementById('pin-error').textContent = '';
  const input = document.getElementById('pin-input');
  input.value = '';
  setTimeout(() => input.focus(), 50);
}

function closePinModal() {
  document.getElementById('pin-overlay').classList.remove('show');
}

function checkPin() {
  const input = document.getElementById('pin-input');
  if (input.value === PARTNER_PIN) {
    closePinModal();
    setRole('partner');
  } else {
    document.getElementById('pin-error').textContent = 'Falscher PIN';
    input.value = '';
    input.focus();
  }
}

function setRole(r) {
  role = r;
  localStorage.setItem('fleissheft-role', r);
  updateRoleUI();
}

function updateRoleUI() {
  document.getElementById('role-marie').classList.toggle('active', role === 'marie');
  document.getElementById('role-partner').classList.toggle('active', role === 'partner');
  document.getElementById('star-section').style.display = role === 'partner' ? 'block' : 'none';
  document.getElementById('star-empty-note').style.display = role === 'partner' ? 'none' : 'block';
  document.getElementById('add-task-row').style.display = role === 'partner' ? 'flex' : 'none';
  document.getElementById('add-task-desc-row').style.display = role === 'partner' ? 'flex' : 'none';
  document.getElementById('add-series-card').style.display = role === 'partner' ? 'block' : 'none';
  render();
}

function totalPoints() {
  return Object.values(state.log || {}).reduce((sum, entry) => sum + (entry.points || 0), 0);
}

function render() {
  // score
  const total = totalPoints();
  document.getElementById('total-points').textContent = total;

  const mr = state.mainReward;
  const rewardDots = document.getElementById('reward-dots');
  rewardDots.innerHTML = Array.from({length: mr.target}, (_, i) =>
    `<span class="series-dot ${i < mr.count ? 'filled' : ''}">★</span>`
  ).join('');
  document.getElementById('reward-text').innerHTML = mr.reward
    ? 'Belohnung bei ' + mr.target + ': <strong>' + escapeHtml(mr.reward) + '</strong>'
    : 'Noch keine Belohnung festgelegt';
  document.getElementById('reward-rounds').textContent = mr.completedRounds
    ? mr.completedRounds + '× eingelöst'
    : '';
  document.getElementById('reward-edit-toggle').style.display = role === 'partner' ? 'inline-block' : 'none';
  if (role !== 'partner') {
    document.getElementById('reward-edit-row').style.display = 'none';
  }

  // tasks
  const tasks = Object.values(state.tasks || {});
  const taskList = document.getElementById('task-list');
  if (!tasks.length) {
    taskList.innerHTML = '<div class="empty-note">Noch keine Aufgaben – leg eine an.</div>';
  } else {
    taskList.innerHTML = tasks.map(t => `
      <div class="task-item">
        <button class="task-check" onclick="completeTask('${t.id}')" title="Erledigt"></button>
        <div class="task-main">
          <div class="task-title">${escapeHtml(t.title)}</div>
          ${t.desc ? `<div class="task-desc">${escapeHtml(t.desc)}</div>` : ''}
        </div>
        <div class="task-points">+${t.points} ★</div>
        ${role === 'partner' ? `<button class="task-remove" onclick="removeTask('${t.id}')">✕</button>` : ''}
      </div>
    `).join('');
  }

  // series
  const seriesArr = Object.values(state.series || {});
  const seriesList = document.getElementById('series-list');
  if (!seriesArr.length) {
    seriesList.innerHTML = '<div class="empty-note">Noch keine Serie angelegt.</div>';
  } else {
    seriesList.innerHTML = seriesArr.map(s => {
      const dots = Array.from({length: s.target}, (_, i) =>
        `<span class="series-dot ${i < s.count ? 'filled' : ''}">★</span>`
      ).join('');
      return `
      <div class="series-card">
        <div class="series-head">
          <div class="series-name">${escapeHtml(s.name)}</div>
          <div class="series-count">${s.count}/${s.target}</div>
        </div>
        <div class="series-dots">${dots}</div>
        ${s.reward ? `<div class="series-reward">Belohnung: <strong>${escapeHtml(s.reward)}</strong></div>` : ''}
        ${s.completedRounds ? `<div class="series-rounds">${s.completedRounds}× abgeschlossen</div>` : ''}
        ${role === 'partner' ? `
        <div class="series-controls">
          <input type="text" id="series-note-${s.id}" placeholder="Notiz (optional)...">
          <button class="primary" onclick="giveSeriesStar('${s.id}')">⭐</button>
          <button class="series-remove" onclick="removeSeries('${s.id}')">✕</button>
        </div>` : ''}
      </div>`;
    }).join('');
  }

}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' }) + ' · ' +
         d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

// Erhöht den Belohnungs-Zähler per Transaktion (sicher auch bei mehreren Geräten gleichzeitig)
function advanceMainReward(amount = 1) {
  let rewardEarned = false;
  let rewardText = '';
  return dataRef.child('mainReward').transaction((current) => {
    const mr = current || { target: 10, reward: '', count: 0, completedRounds: 0 };
    mr.count = (mr.count || 0) + amount;
    rewardText = mr.reward || '';
    if (mr.count >= mr.target) {
      mr.completedRounds = (mr.completedRounds || 0) + 1;
      mr.count = 0;
      rewardEarned = true;
    } else {
      rewardEarned = false;
    }
    return mr;
  }).then(() => ({ rewardEarned, reward: rewardText }));
}

function showError(e) {
  console.error(e);
  alert('Fehler beim Speichern: ' + (e && e.message ? e.message : e) + '\n\nBitte Screenshot davon machen und schicken.');
}

async function addTask() {
  const titleInput = document.getElementById('new-task-title');
  const pointsInput = document.getElementById('new-task-points');
  const descInput = document.getElementById('new-task-desc');
  const title = titleInput.value.trim();
  const points = parseInt(pointsInput.value, 10) || 1;
  const desc = descInput.value.trim();
  if (!title) return;
  const id = 't' + Date.now();
  try {
    await dataRef.child('tasks/' + id).set({ id, title, points, desc });
    titleInput.value = '';
    descInput.value = '';
  } catch (e) {
    showError(e);
  }
}

async function removeTask(id) {
  try {
    await dataRef.child('tasks/' + id).remove();
  } catch (e) {
    showError(e);
  }
}

async function completeTask(id) {
  const task = (state.tasks || {})[id];
  if (!task) return;
  try {
    const logId = dataRef.child('log').push().key;
    const updates = {};
    updates['tasks/' + id] = null;
    updates['log/' + logId] = { id: logId, text: 'Aufgabe erledigt: ' + task.title, points: task.points, ts: Date.now() };
    await dataRef.update(updates);

    const result = await advanceMainReward(task.points);
    if (result.rewardEarned) {
      const rewardLogId = dataRef.child('log').push().key;
      await dataRef.child('log/' + rewardLogId).set({ id: rewardLogId, text: 'Belohnung erreicht: ' + (result.reward || '?'), points: 0, ts: Date.now(), reward: true });
      showToast('🎉 Belohnung erreicht! ' + (result.reward || '?'), 0);
    } else {
      showToast('Neuer Stern für: ' + task.title, task.points);
    }
  } catch (e) {
    showError(e);
  }
}

async function addSeries() {
  const nameInput = document.getElementById('new-series-name');
  const targetInput = document.getElementById('new-series-target');
  const rewardInput = document.getElementById('new-series-reward');
  const name = nameInput.value.trim();
  const target = parseInt(targetInput.value, 10) || 10;
  const reward = rewardInput.value.trim();
  if (!name) return;
  const id = 's' + Date.now();
  try {
    await dataRef.child('series/' + id).set({ id, name, target, reward, count: 0, completedRounds: 0 });
    nameInput.value = '';
    rewardInput.value = '';
  } catch (e) {
    showError(e);
  }
}

async function removeSeries(id) {
  try {
    await dataRef.child('series/' + id).remove();
  } catch (e) {
    showError(e);
  }
}

async function giveSeriesStar(id) {
  const noteInput = document.getElementById('series-note-' + id);
  const note = noteInput ? noteInput.value.trim() : '';
  const seriesBefore = (state.series || {})[id];
  if (!seriesBefore) return;
  const seriesName = seriesBefore.name;
  const text = note ? note : 'Stern für „' + seriesName + '"';

  try {
    let rewardEarned = false;
    let rewardText = '';
    await dataRef.child('series/' + id).transaction((current) => {
      if (!current) return undefined;
      current.count = (current.count || 0) + 1;
      rewardText = current.reward || '';
      if (current.count >= current.target) {
        current.completedRounds = (current.completedRounds || 0) + 1;
        current.count = 0;
        rewardEarned = true;
      } else {
        rewardEarned = false;
      }
      return current;
    });

    const logId = dataRef.child('log').push().key;
    await dataRef.child('log/' + logId).set({ id: logId, text, points: 1, ts: Date.now(), seriesId: id, seriesName });
    if (noteInput) noteInput.value = '';

    if (rewardEarned) {
      const rewardLogId = dataRef.child('log').push().key;
      await dataRef.child('log/' + rewardLogId).set({ id: rewardLogId, text: 'Serie „' + seriesName + '" komplett – Belohnung: ' + (rewardText || '?'), points: 0, ts: Date.now(), seriesId: id, seriesName, reward: true });
      showToast('🎉 Serie „' + seriesName + '" komplett! Belohnung: ' + (rewardText || '?'), 0);
    } else {
      showToast(text, 1);
    }
  } catch (e) {
    showError(e);
  }
}

async function giveStar() {
  const msgInput = document.getElementById('star-message');
  const message = msgInput.value.trim();
  if (!message) return;

  try {
    const logId = dataRef.child('log').push().key;
    await dataRef.child('log/' + logId).set({ id: logId, text: message, points: 1, ts: Date.now() });
    msgInput.value = '';

    const result = await advanceMainReward();
    if (result.rewardEarned) {
      const rewardLogId = dataRef.child('log').push().key;
      await dataRef.child('log/' + rewardLogId).set({ id: rewardLogId, text: 'Belohnung erreicht: ' + (result.reward || '?'), points: 0, ts: Date.now(), reward: true });
      showToast('🎉 Belohnung erreicht! ' + (result.reward || '?'), 0);
    } else {
      showToast(message, 1);
    }
  } catch (e) {
    showError(e);
  }
}

function toggleRewardEdit() {
  const row = document.getElementById('reward-edit-row');
  const input = document.getElementById('reward-edit-input');
  const isOpen = row.style.display === 'flex';
  if (isOpen) {
    row.style.display = 'none';
  } else {
    input.value = state.mainReward.reward || '';
    row.style.display = 'flex';
    setTimeout(() => input.focus(), 50);
  }
}

async function saveMainReward() {
  const input = document.getElementById('reward-edit-input');
  const value = input.value.trim();
  try {
    await dataRef.child('mainReward/reward').set(value);
    document.getElementById('reward-edit-row').style.display = 'none';
  } catch (e) {
    showError(e);
  }
}

let toastTimer = null;
function showToast(message, points) {
  const toast = document.getElementById('wa-toast');
  document.getElementById('wa-message').textContent = '⭐ ' + message;
  document.getElementById('wa-time').textContent = 'jetzt';
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 4500);
}

load();
</script>

</body>
</html>
